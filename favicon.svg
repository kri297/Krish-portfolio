<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081B33" />
      <stop offset="100%" stop-color="#0f2a4a" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- Background Shield shape -->
  <path d="M50,5 L85,20 L85,55 C85,75 70,90 50,95 C30,90 15,75 15,55 L15,20 Z" fill="url(#shieldGrad)" stroke="url(#borderGrad)" stroke-width="4" stroke-linejoin="round" />
  <!-- Cyber line pattern overlay -->
  <path d="M25,25 L45,25 L50,30 L55,25 L75,25" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4" />
  <path d="M50,30 L50,90" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5" />
  <!-- Text KM -->
  <text x="50" y="60" font-family="'Outfit', sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="-1">KM</text>
  <!-- Inner tech accent -->
  <circle cx="50" cy="55" r="30" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="2,6" opacity="0.3" />
</svg>
